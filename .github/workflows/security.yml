name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # full history so gitleaks can scan every commit
      - name: Run gitleaks
        # Use the license-free gitleaks binary (the gitleaks-action requires a paid
        # license for organization accounts). Pinned to a release; bump as needed.
        run: |
          VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --redact --verbose --exit-code 1

  audit:
    name: Dependency Audit (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: sdk
            dir: packages/sdk
          - name: cli
            dir: packages/cli
          - name: dashboard
            dir: apps/dashboard
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - name: Install
        working-directory: ${{ matrix.dir }}
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - name: npm audit (high+)
        working-directory: ${{ matrix.dir }}
        run: npm audit --audit-level=high

  dependency-review:
    name: Dependency Review
    # PR-only: diffs the dependency graph between base and head to block newly
    # introduced vulnerable or disallowed-license dependencies before merge.
    # Requires the repo "Dependency graph" setting (Settings → Security & analysis).
    # Advisory (continue-on-error) until that is enabled so it can't block the gate.
    # Once Dependency graph is on, remove continue-on-error and add this job as a
    # required status check to make it enforcing.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high

  gate:
    name: Security Gate
    if: always()
    needs: [secrets, audit]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Enforce results
        run: |
          if [ "${{ needs.secrets.result }}" != "success" ] || \
             [ "${{ needs.audit.result }}" != "success" ]; then
            echo "One or more security checks failed"
            exit 1
          fi
